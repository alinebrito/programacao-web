<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sobre mim</title>

  <style>
    body {
      background-color: #f5f5f5;
      margin: 40px;
      font-family: Arial;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
    }

    .titulo {
      color: #2c3e50;
      text-align: center;
    }

    .foto {
      width: 200px;
      border-radius: 50%;
      border: 3px solid #2c3e50;
      padding: 5px;
      display: block;
      margin: auto;
    }

    #nome {
      text-align: center;
      font-weight: bold;
    }

    .subtitulo {
      color: #2c3e50;
    }

    .lista {
      background-color: #ecf0f1;
      padding: 15px;
      border-radius: 8px;
    }

    .lista li {
      margin-bottom: 10px;
    }

    .lista li:hover {
      color: #e74c3c;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1 class="titulo">Sobre mim</h1>

    <img class="foto" src="https://avatars.githubusercontent.com/u/14023536?v=4">

    <p id="nome">Meu nome é Aline</p>

    <h2 class="subtitulo">Meus interesses</h2>

    <ul class="lista">
      <li>Programação</li>
      <li>Filmes</li>
      <li>Jogos</li>
    </ul>

  </div>

</body>
</html>
